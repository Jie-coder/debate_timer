<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>辩论计时器</title>
  <style>
:root {
    /*EDITMODE-BEGIN*/
    --tweak-theme: "warm";    --tweak-font-scale: 1;
    --tweak-sound: true;
    --tweak-pro-name: "正方";
    --tweak-con-name: "反方";
    --tweak-立论: 180;
    --tweak-质询: 90;
    --tweak-对辩: 120;
    /*EDITMODE-END*/
  }

  /* Warm theme (default) */
  [data-theme="warm"] {
    --bg: oklch(0.975 0.008 80);
    --bg-2: oklch(0.955 0.012 80);
    --bg-3: oklch(0.92 0.015 80);
    --surface: oklch(0.99 0.005 80);
    --border: oklch(0.88 0.015 80);
    --border-strong: oklch(0.78 0.02 80);
    --ink: oklch(0.22 0.015 60);
    --ink-2: oklch(0.42 0.015 60);
    --ink-3: oklch(0.58 0.015 60);
    --accent: oklch(0.62 0.15 45);
    --accent-soft: oklch(0.92 0.05 55);
    --warn: oklch(0.68 0.18 35);
    --ok: oklch(0.6 0.12 150);
  }

  [data-theme="dark"] {
    --bg: oklch(0.18 0.008 80);
    --bg-2: oklch(0.22 0.01 80);
    --bg-3: oklch(0.26 0.012 80);
    --surface: oklch(0.24 0.01 80);
    --border: oklch(0.32 0.015 80);
    --border-strong: oklch(0.42 0.02 80);
    --ink: oklch(0.94 0.008 80);
    --ink-2: oklch(0.72 0.01 80);
    --ink-3: oklch(0.55 0.012 80);
    --accent: oklch(0.72 0.15 55);
    --accent-soft: oklch(0.32 0.08 55);
    --warn: oklch(0.72 0.18 35);
    --ok: oklch(0.72 0.14 150);
  }

  [data-theme="paper"] {
    --bg: oklch(0.965 0.015 85);
    --bg-2: oklch(0.945 0.02 85);
    --bg-3: oklch(0.9 0.025 85);
    --surface: oklch(0.985 0.01 85);
    --border: oklch(0.85 0.025 80);
    --border-strong: oklch(0.7 0.03 75);
    --ink: oklch(0.25 0.03 60);
    --ink-2: oklch(0.45 0.025 60);
    --ink-3: oklch(0.6 0.02 60);
    --accent: oklch(0.55 0.17 30);
    --accent-soft: oklch(0.9 0.06 40);
    --warn: oklch(0.6 0.2 30);
    --ok: oklch(0.55 0.12 140);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    font-family: "Noto Sans SC", "Newsreader", -apple-system, sans-serif;
    background: var(--bg);
    color: var(--ink);
    font-size: calc(16px * var(--font-scale, 1));
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
    transition: background 0.3s ease, color 0.3s ease;
  }

  .app {
    height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    position: relative;
  }

  /* ========== Header ========== */
  header {
    padding: 20px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 14px;
    font-family: "Newsreader", serif;
  }

  .brand-mark {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--accent);
    position: relative;
  }

  .brand-mark::after {
    content: "";
    position: absolute;
    inset: 6px;
    border-radius: 50%;
    background: var(--surface);
  }

  .brand-mark::before {
    content: "";
    position: absolute;
    top: 50%;
    left: 50%;
    width: 2px;
    height: 10px;
    background: var(--accent);
    transform: translate(-50%, -50%);
    z-index: 1;
  }

  .brand-name {
    font-size: 20px;
    font-weight: 500;
    letter-spacing: 0.02em;
  }
  .brand-topic {
    font-family: "Newsreader", "Noto Sans SC", serif;
    font-size: 22px;
    font-weight: 500;
    color: var(--ink);
    background: transparent;
    border: none;
    border-bottom: 1px dashed transparent;
    padding: 4px 6px;
    min-width: 220px;
    max-width: 520px;
    outline: none;
    letter-spacing: -0.005em;
    transition: border-color .15s ease, background .15s ease;
  }
  .brand-topic::placeholder { color: var(--ink-3); font-style: italic; font-weight: 400; }
  .brand-topic:hover { border-bottom-color: var(--border-strong); }
  .brand-topic:focus { border-bottom-color: var(--accent); background: var(--bg-2); border-radius: 4px; }

  .brand-sub {
    font-size: 12px;
    color: var(--ink-3);
    font-family: "JetBrains Mono", monospace;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .header-actions {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .icon-btn {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    border: 1px solid transparent;
    background: transparent;
    color: var(--ink-2);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.15s ease;
  }

  .icon-btn:hover {
    background: var(--bg-2);
    color: var(--ink);
    border-color: var(--border);
  }

  .icon-btn.active {
    background: var(--accent-soft);
    color: var(--accent);
  }

  /* ========== Mode tabs ========== */
  .mode-tabs {
    display: flex;
    gap: 4px;
    background: var(--bg-2);
    padding: 4px;
    border-radius: 10px;
    border: 1px solid var(--border);
  }

  .mode-tab {
    border: none;
    background: transparent;
    padding: 8px 18px;
    border-radius: 7px;
    cursor: pointer;
    font-family: inherit;
    font-size: 14px;
    color: var(--ink-2);
    transition: all 0.2s ease;
    font-weight: 500;
    letter-spacing: 0.02em;
  }

  .mode-tab:hover {
    color: var(--ink);
  }

  .mode-tab.active {
    background: var(--surface);
    color: var(--ink);
    box-shadow: 0 1px 3px oklch(0 0 0 / 0.06);
  }

  /* ========== Main stage ========== */
  main {
    padding: 40px;
    display: flex;
    flex-direction: column;
    min-height: 0;
    position: relative;
  }

  .stage {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  /* Single timer */
  .single-timer {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    padding: 20px;
    min-height: 0;
  }
  .timer-actions { margin-top: 4px; }

  .single-label {
    font-family: "Newsreader", serif;
    font-style: italic;
    font-size: 22px;
    color: var(--ink-3);
    letter-spacing: 0.03em;
  }

  .single-time {
    font-family: "JetBrains Mono", monospace;
    font-size: clamp(120px, 22vw, 280px);
    font-weight: 300;
    letter-spacing: -0.04em;
    line-height: 0.9;
    color: var(--ink);
    font-variant-numeric: tabular-nums;
    transition: color 0.3s ease;
    cursor: text;
  }
  .single-time.editing, .duel-time.editing {
    outline: 2px dashed var(--accent);
    outline-offset: 8px;
    border-radius: 6px;
  }
  .duel-time { cursor: text; }

  .timer-actions {
    display: flex;
    gap: 12px;
    margin-top: 8px;
  }
  .timer-action-btn {
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--ink-2);
    padding: 8px 18px;
    border-radius: 8px;
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .timer-action-btn:hover { background: var(--bg-2); color: var(--ink); }
  .duel-reset-btn {
    position: absolute;
    top: 14px;
    right: 14px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--ink-2);
    width: 30px; height: 30px;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 3;
    opacity: 0.7;
  }
  .duel-reset-btn:hover { opacity: 1; background: var(--bg-2); }
  .duel-panel[data-side="con"] .duel-reset-btn {
    background: rgba(255,255,255,0.08);
    border-color: rgba(255,255,255,0.15);
    color: var(--bg);
  }

  .single-time.warning { color: var(--warn); }
  .single-time.overtime { color: var(--warn); animation: pulse 0.8s ease infinite; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .progress-wrap {
    width: min(720px, 80%);
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .progress-meta {
    display: flex;
    justify-content: space-between;
    font-family: "JetBrains Mono", monospace;
    font-size: 12px;
    color: var(--ink-3);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .progress-bar {
    height: 6px;
    background: var(--bg-3);
    border-radius: 999px;
    overflow: hidden;
    position: relative;
  }

  .progress-fill {
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    background: var(--ink);
    border-radius: 999px;
    transition: width 0.2s linear, background 0.3s ease;
  }

  .progress-fill.warning { background: var(--warn); }

  /* Duel timer */
  .duel {
    flex: 1;
    display: grid;
    grid-template-rows: 1fr 1fr;
    gap: 16px;
    min-height: 0;
  }

  .duel-panel {
    position: relative;
    border-radius: 18px;
    border: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 36px 60px;
    cursor: pointer;
    transition: all 0.3s ease;
    overflow: hidden;
  }

  .duel-panel[data-side="con"] {
    background: var(--ink);
    color: var(--bg);
    border-color: var(--ink);
  }

  .duel-panel.inactive { opacity: 0.55; }

  .duel-panel.active {
    box-shadow: 0 0 0 2px var(--accent), 0 12px 40px oklch(0 0 0 / 0.08);
    transform: scale(1.005);
  }

  .duel-panel.active[data-side="con"] {
    box-shadow: 0 0 0 2px var(--accent), 0 12px 40px oklch(0 0 0 / 0.3);
  }

  .duel-side {
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 1;
  }

  .duel-side-label {
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    opacity: 0.55;
  }

  .duel-side-name {
    font-family: "Newsreader", serif;
    font-size: 44px;
    font-weight: 500;
    letter-spacing: -0.01em;
  }

  .duel-status {
    font-size: 12px;
    font-family: "JetBrains Mono", monospace;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    opacity: 0.55;
    margin-top: 2px;
  }

  .duel-panel.active .duel-status::before {
    content: "●  ";
    color: var(--accent);
    animation: blink 1.2s ease infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .duel-time {
    font-family: "JetBrains Mono", monospace;
    font-size: clamp(80px, 13vw, 160px);
    font-weight: 300;
    letter-spacing: -0.04em;
    line-height: 0.9;
    font-variant-numeric: tabular-nums;
    z-index: 1;
    transition: color 0.3s ease;
  }

  .duel-time.warning { color: var(--warn); }
  .duel-time.overtime { color: var(--warn); animation: pulse 0.8s ease infinite; }

  .duel-progress {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: 3px;
    background: transparent;
  }

  .duel-progress-fill {
    height: 100%;
    background: var(--accent);
    width: 100%;
    transition: width 0.2s linear;
  }

  .duel-divider {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: var(--bg);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ink-2);
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    z-index: 2;
  }

  /* Footer */
  footer {
    padding: 20px 40px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
  }

  .controls {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .btn {
    border: 1px solid var(--border-strong);
    background: var(--surface);
    color: var(--ink);
    padding: 10px 22px;
    border-radius: 10px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s ease;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    letter-spacing: 0.02em;
  }

  .btn:hover { background: var(--bg-2); }

  .btn-primary {
    background: var(--ink);
    color: var(--bg);
    border-color: var(--ink);
    min-width: 140px;
    justify-content: center;
    padding: 12px 24px;
  }

  .btn-primary:hover {
    background: var(--ink-2);
    border-color: var(--ink-2);
  }

  .btn-accent {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }

  .btn-ghost {
    border-color: transparent;
  }

  .kbd {
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 4px;
    background: var(--bg-2);
    color: var(--ink-3);
    border: 1px solid var(--border);
    letter-spacing: 0.05em;
  }

  .session-flow {
    display: flex;
    gap: 10px;
    align-items: center;
    font-size: 13px;
    color: var(--ink-3);
  }

  .flow-dots {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .flow-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--border-strong);
    transition: all 0.2s ease;
  }

  .flow-dot.done { background: var(--accent); }
  .flow-dot.current {
    background: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }

  .flow-label {
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-3);
  }

  .keyhint {
    font-size: 12px;
    color: var(--ink-3);
    display: flex;
    gap: 14px;
  }

  /* ========== Settings drawer ========== */
  .drawer {
    position: fixed;
    top: 0;
    right: -380px;
    width: 380px;
    height: 100vh;
    background: var(--surface);
    border-left: 1px solid var(--border);
    padding: 24px 28px;
    overflow-y: auto;
    transition: right 0.3s ease;
    z-index: 50;
  }

  .drawer.open { right: 0; }

  .drawer h3 {
    font-family: "Newsreader", serif;
    font-size: 20px;
    font-weight: 500;
    margin-bottom: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .drawer-section {
    padding: 16px 0;
    border-top: 1px solid var(--border);
  }

  .drawer-section-label {
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-3);
    margin-bottom: 12px;
  }

  .field-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 0;
    gap: 12px;
  }

  .field-label {
    font-size: 13px;
    color: var(--ink-2);
  }

  .input {
    border: 1px solid var(--border-strong);
    background: var(--bg);
    color: var(--ink);
    padding: 8px 12px;
    border-radius: 8px;
    font-family: "JetBrains Mono", monospace;
    font-size: 13px;
    width: 100px;
    text-align: center;
  }

  .input-text {
    font-family: "Noto Sans SC", sans-serif;
    text-align: left;
  }

  .chip-group {
    display: flex;
    gap: 4px;
    background: var(--bg-2);
    padding: 3px;
    border-radius: 8px;
  }

  .chip {
    border: none;
    background: transparent;
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 12px;
    color: var(--ink-2);
    cursor: pointer;
    font-family: inherit;
  }

  .chip.active {
    background: var(--surface);
    color: var(--ink);
    box-shadow: 0 1px 2px oklch(0 0 0 / 0.05);
  }

  .stages-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .stage-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    border-radius: 8px;
    background: var(--bg-2);
    border: 1px solid var(--border);
    cursor: grab;
  }
  .stage-row.dragging { opacity: 0.4; }
  .stage-row.drag-over { border-color: var(--accent); background: var(--accent-soft); }
  .stage-grip {
    color: var(--ink-3);
    font-family: "JetBrains Mono", monospace;
    font-size: 12px;
    cursor: grab;
    user-select: none;
  }
  .stage-name-input {
    flex: 1;
    border: none;
    background: transparent;
    color: var(--ink);
    font-family: inherit;
    font-size: 13px;
    padding: 4px 6px;
    border-radius: 4px;
    min-width: 0;
  }
  .stage-name-input:focus { outline: 1px solid var(--border-strong); background: var(--surface); }
  .stage-type-pill {
    font-family: "JetBrains Mono", monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    padding: 3px 6px;
    border-radius: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--ink-2);
    cursor: pointer;
    text-transform: uppercase;
  }
  .stage-type-pill[data-type="duel"] {
    background: var(--accent-soft);
    color: var(--accent);
    border-color: var(--accent);
  }
  .stage-dur-input {
    width: 56px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--ink);
    font-family: "JetBrains Mono", monospace;
    font-size: 12px;
    padding: 4px 6px;
    border-radius: 4px;
    text-align: center;
  }
  .stage-del {
    border: none;
    background: transparent;
    color: var(--ink-3);
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 14px;
  }
  .stage-del:hover { color: var(--warn); background: var(--bg-3); }
  .add-chip {
    border: 1px dashed var(--border-strong);
    background: transparent;
    color: var(--ink-2);
    font-size: 11px;
    padding: 5px 10px;
    border-radius: 6px;
    cursor: pointer;
  }
  .add-chip:hover { background: var(--bg-2); color: var(--ink); }

  .switch {
    position: relative;
    width: 36px;
    height: 20px;
    background: var(--border-strong);
    border-radius: 999px;
    cursor: pointer;
    transition: background 0.2s ease;
  }

  .switch::after {
    content: "";
    position: absolute;
    left: 2px;
    top: 2px;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: white;
    transition: left 0.2s ease;
  }

  .switch.on {
    background: var(--accent);
  }

  .switch.on::after { left: 18px; }

  .overlay {
    position: fixed;
    inset: 0;
    background: oklch(0 0 0 / 0.3);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
    z-index: 40;
  }

  .overlay.show {
    opacity: 1;
    pointer-events: auto;
  }

  /* Flash on time up */
  .flash {
    position: fixed;
    inset: 0;
    background: var(--warn);
    opacity: 0;
    pointer-events: none;
    z-index: 100;
    transition: opacity 0.15s ease;
  }

  .flash.on { opacity: 0.25; }

  /* Fullscreen tweak */
  :fullscreen header,
  :fullscreen footer {
    padding-left: 60px;
    padding-right: 60px;
  }

  :fullscreen .single-time {
    font-size: clamp(160px, 26vw, 380px);
  }

  @media (max-width: 900px) {
    header, footer { padding: 16px 20px; }
    main { padding: 20px; }
    .brand-sub { display: none; }
    .keyhint { display: none; }
  }


/* vintage-festival-restyle */
:root {
  --vf-paper: #e9e9e7;
  --vf-paper-soft: #f4f4f2;
  --vf-ink: #080808;
  --vf-muted: #414141;
  --vf-faint: #888884;
  --vf-line: #101010;
  --vf-track: #b8b8b3;
  --vf-warn: #b53125;
}

[data-theme="warm"] {
  --bg: var(--vf-paper);
  --bg-2: var(--vf-paper-soft);
  --bg-3: var(--vf-track);

  // Per-stage runtime cache: stageId -> { remaining, duelPro, duelCon, duelActive }

  const state = {

  function curStage() {

  function curMode() { return curStage().type; } // 'single' | 'duel'
  function curDuration() { return curStage().duration; }
  function curName() { return curStage().name; }
  function ensureCoverStage() {
    const base = DEFAULT_STAGES.find(s => s.type === 'cover') || { id: 'cover', name: '\u9996\u9875', type: 'cover', duration: 0 };
    if (!Array.isArray(state.stages)) state.stages = [];
    let coverIndex = state.stages.findIndex(s => s.type === 'cover' || s.id === 'cover');
    let cover = coverIndex >= 0 ? state.stages.splice(coverIndex, 1)[0] : { ...base };
    cover.id = 'cover';
    cover.type = 'cover';
    cover.duration = 0;
    cover.name = cover.name || base.name;
    state.stages = state.stages.map(s => ({
      ...s,
      type: s.type === 'duel' ? 'duel' : (s.type === 'cover' ? 'cover' : 'single'),
      duration: s.type === 'cover' ? 0 : Math.max(10, Number(s.duration) || 60),

  const STORAGE_KEY = 'debate-timer-v2';
  const PRESETS_KEY = 'debate-timer-v2-presets';
  let timerPresets = [];
  function saveState() {
    const s = {

      autoFlow: state.autoFlow, proName: state.proName, conName: state.conName,
      topic: state.topic, matchStage: state.matchStage,

    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch (e) {}

    try {
      const s = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');

      Object.assign(state, s);

      if (!Array.isArray(state.stages) || state.stages.length === 0) {

    osc.stop(ctx.currentTime + duration + 0.02);

          '<div class="cover-kicker">' +

          '</label>' +

  function renderSingle() {

    document.getElementById('btnResetSingle').addEventListener('click', () => {

  function wireEditableTime() {
    document.querySelectorAll('.editable-time').forEach(el => {

  }

  function startEditTime(el) {
    if (state.running) return;
    const target = el.dataset.target; // single | pro | con
    const cur = target === 'single' ? state.remaining

    const initial = formatTime(Math.max(0, Math.ceil(cur)));
    el.classList.add('editing');
    const orig = el.textContent;
    el.contentEditable = 'true';
    el.textContent = initial;
    const range = document.createRange();
    range.selectNodeContents(el);
    const sel = window.getSelection();

    const finish = (commit) => {

      el.classList.remove('editing');

      else if (e.key === 'Escape') { e.preventDefault(); finish(false); }
    };
    el.addEventListener('blur', onBlur);
    el.addEventListener('keydown', onKey);
  }

  function parseTimeStr(s) {
    if (!s) return null;
    s = s.replace(/[–—−]/g, '-').trim();
    if (/^\d+$/.test(s)) return parseInt(s);
    const m = s.match(/^(-?)(\d+):(\d{1,2})$/);
    if (!m) return null;
    const sign = m[1] === '-' ? -1 : 1;
    const min = parseInt(m[2]); const sec = parseInt(m[3]);
    if (sec >= 60) return null;
    return sign * (min * 60 + sec);
  }

    document.getElementById('btnResetCon').addEventListener('click', (e) => {

    wireEditableTime();

  function updateDuelActive() {
    const pro = document.getElementById('panelPro');
    const con = document.getElementById('panelCon');
    if (!pro || !con) return;
    if (state.duel.active === 'pro') {
      pro.classList.add('active'); pro.classList.remove('inactive');
      con.classList.add('inactive'); con.classList.remove('active');
      pro.querySelector('.duel-status').textContent = '计时中';
      con.querySelector('.duel-status').textContent = state.running ? '暂停中' : '待命';
    } else {
      con.classList.add('active'); con.classList.remove('inactive');
      pro.classList.add('inactive'); pro.classList.remove('active');
      con.querySelector('.duel-status').textContent = '计时中';
      pro.querySelector('.duel-status').textContent = state.running ? '暂停中' : '待命';
    }
  }

  
  function updateTimes() {
    if (curMode() === 'cover') {
      syncCoverFields();
      syncHeaderTopic();
      return;
    }
    if (curMode() === 'duel') {
      const proEl = document.getElementById('proTime');
      const conEl = document.getElementById('conTime');
      const proProg = document.getElementById('proProgress');
      const conProg = document.getElementById('conProgress');
      const total = curDuration();
      if (proEl && !proEl.classList.contains('editing')) {
        proEl.textContent = formatTime(state.duel.pro);
        proEl.className = 'duel-time editable-time' + warnClass(state.duel.pro, total);
      }
      if (conEl && !conEl.classList.contains('editing')) {
        conEl.textContent = formatTime(state.duel.con);
        conEl.className = 'duel-time editable-time' + warnClass(state.duel.con, total);
      }
      if (proProg) proProg.style.width = Math.max(0, state.duel.pro / total * 100) + '%';
      if (conProg) conProg.style.width = Math.max(0, state.duel.con / total * 100) + '%';
      const proName = document.getElementById('proNameEl');
      const conName = document.getElementById('conNameEl');
      if (proName) proName.textContent = '\u6b63\u65b9';
      if (conName) conName.textContent = '\u53cd\u65b9';
    } else {
      const total = curDuration();
      const disp = document.getElementById('timeDisplay');
      if (disp && !disp.classList.contains('editing')) {
        disp.textContent = formatTime(state.remaining);
        disp.className = 'single-time editable-time' + warnClass(state.remaining, total);
      }
      const fill = document.getElementById('progressFill');
      if (fill) {
        fill.style.width = Math.max(0, state.remaining / total * 100) + '%';
        fill.className = 'progress-fill' + (state.remaining <= 30 && state.remaining > 0 ? ' warning' : '');
      }
      const elapsed = document.getElementById('elapsedLabel');
      if (elapsed) elapsed.textContent = '\u5df2\u7528 ' + formatTime(total - Math.max(0, state.remaining));
    }
  }

  function warnClass(sec, total) {
    if (sec <= 0) return ' overtime';
    if (sec <= 30) return ' warning';
    return '';
  }

  /* ---------------- Tick loop ---------------- */
  let rafId = null;
  function loop(ts) {
    if (!state.running) { rafId = null; return; }
    if (!state.lastTick) state.lastTick = ts;
    const delta = (ts - state.lastTick) / 1000;
    state.lastTick = ts;

    let prevWhole;
    if (curMode() === 'duel') {
      const k = state.duel.active;
      prevWhole = Math.ceil(state.duel[k]);
      state.duel[k] -= delta;
      checkBeeps(prevWhole, state.duel[k], curDuration());
    } else {
      prevWhole = Math.ceil(state.remaining);
      state.remaining -= delta;
      checkBeeps(prevWhole, state.remaining, curDuration());
    }
    updateTimes();
    rafId = requestAnimationFrame(loop);
  }

  function checkBeeps(prev, now, total) {
    const prevSec = Math.ceil(prev);
    const nowSec = Math.ceil(now);
    if (prevSec === nowSec) return;
    // 30s warning
    if (prevSec === 31 && nowSec <= 30 && nowSec > 0) {
      beep30();
    }
    // last 10s ticks
    if (nowSec <= 10 && nowSec > 0 && prevSec !== nowSec) {
      beepTick();
    }
    // zero
    if (prevSec > 0 && nowSec <= 0) {
      beepEnd();
      flashScreen();
      handleTimeUp();
    }
  }

  function handleTimeUp() {
    if (curMode() === 'duel') {
      // Auto-switch to the other side if it still has time
      const other = state.duel.active === 'pro' ? 'con' : 'pro';
      if (state.duel[other] > 0) {
        state.duel.active = other;
        // keep running
        updateDuelActive();
        updateTimes();
      } else {
        state.running = false;
        updateStartButton();
      }
    } else {
      state.running = false;
      updateStartButton();
      if (state.autoFlow) {
        setTimeout(() => nextStage(), 1200);
      }
    }
  }

  function flashScreen() {
    const f = document.getElementById('flash');
    f.classList.add('on');
    setTimeout(() => f.classList.remove('on'), 180);
    setTimeout(() => f.classList.add('on'), 320);
    setTimeout(() => f.classList.remove('on'), 520);
  }

  /* ---------------- Controls ---------------- */
  function toggleRun() {
    if (curMode() === 'cover') return;
    ensureAudio();
    state.running = !state.running;
    state.lastTick = 0;
    if (state.running && !rafId) rafId = requestAnimationFrame(loop);
    updateStartButton();
    if (curMode() === 'duel') updateDuelActive();
  }

  function resetTimer() {
    state.running = false;
    updateStartButton();
    if (curMode() === 'cover') {
      updateTimes();
      return;
    }
    if (curMode() === 'duel') {
      state.duel.pro = curDuration();
      state.duel.con = curDuration();
      state.duel.active = 'pro';
      const rt = getRuntime(curStage().id);
      rt.duelPro = state.duel.pro; rt.duelCon = state.duel.con; rt.duelActive = 'pro';
    } else {
      state.remaining = curDuration();
      const rt = getRuntime(curStage().id);
      rt.remaining = state.remaining;
    }
    updateTimes();
    if (curMode() === 'duel') updateDuelActive();
  }

  function setCurrent(id) {
    if (!state.stages.find(s => s.id === id)) return;
    // Save current runtime to cache
    saveCurrentRuntime();
    state.currentId = id;
    state.running = false;
    // Restore from cache (preserves remaining)
    const rt = getRuntime(id);
    if (curMode() === 'cover') {
      state.remaining = 0;
    } else if (curMode() === 'duel') {
      state.duel.pro = rt.duelPro;
      state.duel.con = rt.duelCon;
      state.duel.active = rt.duelActive || 'pro';
    } else {
      state.remaining = rt.remaining;
    }
    renderModeTabs();
    renderStage();
    updateStartButton();
    updateFlowDots();
    saveState();
  }

  function saveCurrentRuntime() {
    const id = state.currentId;
    const rt = getRuntime(id);
    if (!rt) return;
    if (curMode() === 'cover') {
      return;
    }
    if (curMode() === 'duel') {
      rt.duelPro = state.duel.pro;
      rt.duelCon = state.duel.con;
      rt.duelActive = state.duel.active;
    } else {
      rt.remaining = state.remaining;
    }
  }

  function nextStage() {
    const i = state.stages.findIndex(s => s.id === state.currentId);
    const n = (i + 1) % state.stages.length;
    setCurrent(state.stages[n].id);
  }
  function prevStage() {
    const i = state.stages.findIndex(s => s.id === state.currentId);
    const n = (i - 1 + state.stages.length) % state.stages.length;
    setCurrent(state.stages[n].id);
  }

  function renderModeTabs() {
    const tabs = document.getElementById('modeTabs');
    tabs.innerHTML = '';
    state.stages.forEach(s => {
      const b = document.createElement('button');
      b.className = 'mode-tab' + (s.id === state.currentId ? ' active' : '');
      b.dataset.id = s.id;
      b.textContent = s.name;
      tabs.appendChild(b);
    });
  }

  function updateStartButton() {
    const label = document.getElementById('startLabel');
    const icon = document.getElementById('iconPlay');
    const btn = document.getElementById('btnStart');
    if (curMode() === 'cover') {
      if (btn) { btn.disabled = true; btn.classList.add('disabled'); }
      label.textContent = '\u65e0\u8ba1\u65f6';
      icon.innerHTML = '<path d="M5 12h14"/>';
      return;
    }
    if (btn) { btn.disabled = false; btn.classList.remove('disabled'); }
    if (state.running) {
      label.textContent = '\u6682\u505c';
      icon.innerHTML = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
    } else {
      label.textContent = state.remaining <= 0 && curMode() !== 'duel' ? '\u5df2\u7ed3\u675f' : '\u5f00\u59cb';
      icon.innerHTML = '<polygon points="6 4 20 12 6 20 6 4"/>';
    }
  }

  function updateFlowDots() {
    const dots = document.getElementById('flowDots');
    dots.innerHTML = '';
    const curIdx = state.stages.findIndex(s => s.id === state.currentId);
    state.stages.forEach((stg, i) => {
      const d = document.createElement('div');
      d.className = 'flow-dot' + (i === curIdx ? ' current' : i < curIdx ? ' done' : '');
      d.title = stg.name;
      dots.appendChild(d);
    });
    const ft = document.getElementById('flowText');
    if (ft) ft.textContent = '流程：' + state.stages.map(s => s.name).join(' → ');
  }

  /* ---------------- Stages drawer list ---------------- */
  function renderStagesList() {
    const list = document.getElementById('stagesList');
    list.innerHTML = '';
    state.stages.forEach((stg, idx) => {
      const isCover = stg.type === 'cover';
      const row = document.createElement('div');
      row.className = 'stage-row';
      row.draggable = true;
      row.dataset.idx = idx;
      row.innerHTML = `
        <span class="stage-grip">⋮⋮</span>
        <input class="stage-name-input" value="${stg.name.replace(/"/g, '&quot;')}" maxlength="10">
        <button class="stage-type-pill" data-type="${stg.type}" title="${isCover ? '\u9996\u9875\u4e0d\u53c2\u4e0e\u8ba1\u65f6' : '\u5207\u6362\u7c7b\u578b'}" ${isCover ? 'disabled' : ''}>${isCover ? '\u9996\u9875' : (stg.type === 'duel' ? '\u53cc' : '\u5355')}</button>
        <input type="number" class="stage-dur-input" value="${stg.duration}" min="0" step="10" ${isCover ? 'disabled' : ''}>
        <span style="font-size:10px;color:var(--ink-3);font-family:'JetBrains Mono',monospace;">s</span>
        <button class="stage-del" title="\u5220\u9664" ${isCover ? 'disabled' : ''}>\u00d7</button>
      `;
      // name
      row.querySelector('.stage-name-input').addEventListener('input', (e) => {
        stg.name = e.target.value.slice(0, 10) || '环节';
        renderModeTabs(); updateFlowDots();
        if (stg.id === state.currentId) renderStage();
        saveState();
      });
      // type toggle
      row.querySelector('.stage-type-pill').addEventListener('click', (e) => {
        if (stg.type === 'cover') return;
        stg.type = stg.type === 'duel' ? 'single' : 'duel';
        renderStagesList();
        if (stg.id === state.currentId) { resetTimer(); renderStage(); }
        saveState();
      });
      // duration
      row.querySelector('.stage-dur-input').addEventListener('change', (e) => {
        if (stg.type === 'cover') return;
        const v = Math.max(10, parseInt(e.target.value) || 10);
        stg.duration = v; e.target.value = v;
        // invalidate cache so the new duration takes effect
        delete runtimeCache[stg.id];
        if (stg.id === state.currentId && !state.running) resetTimer();
        saveState();
      });
      // delete
      row.querySelector('.stage-del').addEventListener('click', () => {
        if (stg.type === 'cover') return;
        if (state.stages.length <= 1) return;
        const wasCurrent = stg.id === state.currentId;
        state.stages = state.stages.filter(s => s.id !== stg.id);
        if (wasCurrent) state.currentId = state.stages[0].id;
        renderStagesList(); renderModeTabs(); updateFlowDots();
        if (wasCurrent) { resetTimer(); renderStage(); }
        saveState();
      });
      // drag
      row.addEventListener('dragstart', (e) => {
        row.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', String(idx));
      });
      row.addEventListener('dragend', () => row.classList.remove('dragging'));
      row.addEventListener('dragover', (e) => { e.preventDefault(); row.classList.add('drag-over'); });
      row.addEventListener('dragleave', () => row.classList.remove('drag-over'));
      row.addEventListener('drop', (e) => {
        e.preventDefault();
        row.classList.remove('drag-over');
        const from = parseInt(e.dataTransfer.getData('text/plain'));
        const to = idx;
        if (from === to) return;
        const item = state.stages.splice(from, 1)[0];
        state.stages.splice(to, 0, item);
        ensureCoverStage();
        renderStagesList(); renderModeTabs(); updateFlowDots();
        saveState();
      });
      list.appendChild(row);
    });
  }

  function addStage(name, type, dur) {
    const id = 's' + Date.now() + Math.floor(Math.random()*1000);
    state.stages.push({ id, name, type, duration: dur });
    ensureCoverStage();
    renderStagesList(); renderModeTabs(); updateFlowDots();
    saveState();
  }

  /* ---------------- Preset storage ---------------- */
  function clearRuntimeCache() {
    Object.keys(runtimeCache).forEach(k => delete runtimeCache[k]);
  }

  function cloneStages(stages) {
    return stages.map(s => ({ id: s.id, name: s.name, type: s.type, duration: s.duration }));
  }

  function loadTimerPresets() {
    try {
      const data = JSON.parse(localStorage.getItem(PRESETS_KEY) || '[]');
      return Array.isArray(data) ? data.slice(0, 3) : [];
    } catch (e) {
      return [];
    }
  }

  function saveTimerPresets() {
    try { localStorage.setItem(PRESETS_KEY, JSON.stringify(timerPresets.slice(0, 3))); } catch (e) {}
  }

  function escapeHtml(value) {
    return String(value).replace(/[&<>"']/g, ch => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[ch]));
  }

  function currentPresetSnapshot(name) {
    return {
      id: 'p' + Date.now() + Math.floor(Math.random() * 1000),
      name,
      currentId: state.currentId,
      stages: cloneStages(state.stages),
      savedAt: Date.now(),
    };
  }

  function setPresetStatus(text) {
    const el = document.getElementById('presetStatus');
    if (!el) return;
    el.textContent = text || '';
    if (text) setTimeout(() => { if (el.textContent === text) el.textContent = ''; }, 1800);
  }

  function renderPresetList() {
    const list = document.getElementById('presetList');
    if (!list) return;
    list.innerHTML = '';
    if (timerPresets.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'preset-hint';
      empty.textContent = '还没有保存的计时器。';
      list.appendChild(empty);
      return;
    }
    timerPresets.forEach(preset => {
      const item = document.createElement('div');
      item.className = 'preset-item';
      const totalSeconds = preset.stages.reduce((sum, stg) => sum + (Number(stg.duration) || 0), 0);
      item.innerHTML = '<div>' +
        '<div class="preset-title">' + escapeHtml(preset.name) + '</div>' +
        '<div class="preset-meta">' + preset.stages.length + ' 个环节 · 共 ' + formatTime(totalSeconds) + '</div>' +
        '</div>' +
        '<div class="preset-actions">' +
          '<button class="chip" data-action="load">套用</button>' +
          '<button class="chip" data-action="update">修改</button>' +
          '<button class="chip" data-action="delete">删除</button>' +
        '</div>';
      item.querySelector('[data-action="load"]').addEventListener('click', () => loadTimerPreset(preset.id));
      item.querySelector('[data-action="update"]').addEventListener('click', () => updateTimerPreset(preset.id));
      item.querySelector('[data-action="delete"]').addEventListener('click', () => deleteTimerPreset(preset.id));
      list.appendChild(item);
    });
  }

  function saveTimerPresetFromInput() {
    const input = document.getElementById('presetNameInput');
    const name = (input ? input.value : '').trim();
    if (!name) { setPresetStatus('先输入名称'); return; }
    const existing = timerPresets.find(p => p.name === name);
    if (existing) {
      existing.currentId = state.currentId;
      existing.stages = cloneStages(state.stages);
      existing.savedAt = Date.now();
      setPresetStatus('已修改');
    } else {
      if (timerPresets.length >= 3) { setPresetStatus('最多 3 个'); return; }
      timerPresets.push(currentPresetSnapshot(name));
      setPresetStatus('已保存');
    }
    if (input) input.value = '';
    saveTimerPresets();
    renderPresetList();
  }

  function loadTimerPreset(id) {
    const preset = timerPresets.find(p => p.id === id);
    if (!preset) return;
    state.running = false;
    state.stages = cloneStages(preset.stages);
    ensureCoverStage();
    state.currentId = state.stages.find(s => s.id === preset.currentId) ? preset.currentId : state.stages[0].id;
    clearRuntimeCache();
    resetTimer();
    renderStagesList();
    renderModeTabs();
    renderStage();
    updateFlowDots();
    updateStartButton();
    saveState();
    setPresetStatus('已套用');
  }

  function updateTimerPreset(id) {
    const preset = timerPresets.find(p => p.id === id);
    if (!preset) return;
    preset.currentId = state.currentId;
    preset.stages = cloneStages(state.stages);
    preset.savedAt = Date.now();
    saveTimerPresets();
    renderPresetList();
    setPresetStatus('已修改');
  }

  function deleteTimerPreset(id) {
    timerPresets = timerPresets.filter(p => p.id !== id);
    saveTimerPresets();
    renderPresetList();
    setPresetStatus('已删除');
  }

  /* ---------------- Drawer ---------------- */
  const drawer = document.getElementById('drawer');
  const overlay = document.getElementById('overlay');
  function openDrawer() { drawer.classList.add('open'); overlay.classList.add('show'); }
  function closeDrawer() { drawer.classList.remove('open'); overlay.classList.remove('show'); }

  /* ---------------- Theme + font ---------------- */
  function applyTheme() {
    document.body.dataset.theme = state.theme;
    document.documentElement.style.setProperty('--font-scale', state.fontScale);
    document.querySelectorAll('#themeGroup .chip').forEach(c => {
      c.classList.toggle('active', c.dataset.theme === state.theme);
    });
    document.querySelectorAll('#fontGroup .chip').forEach(c => {
      c.classList.toggle('active', parseFloat(c.dataset.scale) === state.fontScale);
    });
  }

  

  function applyInputs() {
    document.getElementById('proName').value = state.proName;
    document.getElementById('conName').value = state.conName;
    document.getElementById('swSound').classList.toggle('on', state.sound);
    document.getElementById('swTick').classList.toggle('on', state.tick);
    document.getElementById('swAutoFlow').classList.toggle('on', state.autoFlow);
    const iconSound = document.getElementById('iconSound');
    const btnSound = document.getElementById('btnSound');
    btnSound.classList.toggle('active', state.sound);
  }

  /* ---------------- Event wiring ---------------- */
  function wire() {
    document.getElementById('modeTabs').addEventListener('click', (e) => {
      const b = e.target.closest('.mode-tab');
      if (b) setCurrent(b.dataset.id);
    });
    document.querySelectorAll('.add-chip').forEach(btn => {
      btn.addEventListener('click', () => {
        addStage(btn.dataset.add, btn.dataset.type, parseInt(btn.dataset.dur));
      });
    });
    document.getElementById('btnStart').addEventListener('click', toggleRun);
    document.getElementById('btnPrev').addEventListener('click', prevStage);
    document.getElementById('btnNext').addEventListener('click', nextStage);
    const topicEl = document.getElementById('topicInput');
    if (topicEl) {
      topicEl.value = state.topic || '';
      topicEl.addEventListener('input', e => { state.topic = e.target.value; syncCoverFields(); saveState(); });
    }
    document.getElementById('btnSettings').addEventListener('click', openDrawer);
    document.getElementById('drawerClose').addEventListener('click', closeDrawer);
    overlay.addEventListener('click', closeDrawer);

    document.getElementById('btnSound').addEventListener('click', () => {
      state.sound = !state.sound;
      applyInputs(); saveState();
    });

    document.getElementById('btnFullscreen').addEventListener('click', () => {
      if (!document.fullscreenElement) document.documentElement.requestFullscreen();
      else document.exitFullscreen();
    });

    document.getElementById('themeGroup').addEventListener('click', (e) => {
      const b = e.target.closest('.chip');
      if (!b) return;
      state.theme = b.dataset.theme;
      applyTheme(); saveState();
    });

    document.getElementById('fontGroup').addEventListener('click', (e) => {
      const b = e.target.closest('.chip');
      if (!b) return;
      state.fontScale = parseFloat(b.dataset.scale);
      applyTheme(); saveState();
    });

    document.getElementById('savePresetBtn').addEventListener('click', saveTimerPresetFromInput);
    document.getElementById('presetNameInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') saveTimerPresetFromInput();
    });

    document.getElementById('proName').addEventListener('input', (e) => {
      state.proName = e.target.value.slice(0, 20) || '正方';
      updateTimes(); saveState();
    });
    document.getElementById('conName').addEventListener('input', (e) => {
      state.conName = e.target.value.slice(0, 20) || '反方';
      updateTimes(); saveState();
    });

    document.getElementById('swSound').addEventListener('click', () => {
      state.sound = !state.sound; applyInputs(); saveState();
    });
    document.getElementById('swTick').addEventListener('click', () => {
      state.tick = !state.tick; applyInputs(); saveState();
    });
    document.getElementById('swAutoFlow').addEventListener('click', () => {
      state.autoFlow = !state.autoFlow; applyInputs(); saveState();
    });

    document.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      if (e.code === 'Space') { e.preventDefault(); toggleRun(); }
      else if (e.key.toLowerCase() === 'r') resetTimer();
      else if (e.key === ',' || e.key === '<') prevStage();
      else if (e.key === '.' || e.key === '>') nextStage();
      else if (e.key === '1' && curMode() === 'duel') {
        state.duel.active = 'pro';
        if (!state.running) toggleRun();
        updateDuelActive();
      }
      else if (e.key === '2' && curMode() === 'duel') {
        state.duel.active = 'con';
        if (!state.running) toggleRun();
        updateDuelActive();
      }
      else if (e.key === 'Tab') { e.preventDefault(); nextStage(); }
      else if (e.key.toLowerCase() === 'f') {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
      }
      else if (e.key.toLowerCase() === 'm') {
        state.sound = !state.sound; applyInputs(); saveState();
      }
    });
  }

  /* ---------------- Init ---------------- */
  loadState();
  timerPresets = loadTimerPresets();
  applyTheme();
  applyInputs();
  renderStagesList();
  renderPresetList();
  renderModeTabs();
  ensureCoverStage();
  if (!state.stages.find(s => s.id === state.currentId)) state.currentId = state.stages[0].id;
  if (curMode() === 'cover') {
    state.remaining = 0;
  } else if (curMode() === 'duel') {
    state.duel.pro = curDuration();
    state.duel.con = curDuration();
  } else {
    state.remaining = curDuration();
  }
  renderStage();
  updateFlowDots();
  updateStartButton();
  wire();
})();

</script>
</head>
<body data-theme="warm">
<div class="app" id="app">
    <!-- Header -->
    <header>
      <div class="brand">
        <div class="brand-mark"></div>
        <textarea class="brand-topic" id="topicInput" placeholder="输入辩题…" rows="2"></textarea>
      </div>

      <div class="mode-tabs" id="modeTabs"></div>

      <div class="header-actions">
        <button class="icon-btn" id="btnSound" title="提示音 (M)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" id="iconSound">
            <path d="M11 5L6 9H2v6h4l5 4V5z"></path>
            <path d="M15.54 8.46a5 5 0 010 7.07M19.07 4.93a10 10 0 010 14.14"></path>
          </svg>
        </button>
        <button class="icon-btn" id="btnFullscreen" title="全屏 (F)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
            <path d="M3 7V3h4M17 3h4v4M21 17v4h-4M7 21H3v-4"></path>
          </svg>
        </button>
        <button class="icon-btn" id="btnSettings" title="设置">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"></path>
          </svg>
        </button>
      </div>
    </header>

    <!-- Main -->
    <main>
      <div class="stage" id="stage"></div>
    </main>

    <!-- Footer -->
    <footer>
      <div class="session-flow" id="sessionFlow">
        <span class="flow-label">环节</span>
        <div class="flow-dots" id="flowDots"></div>
      </div>

      <div class="controls">
        <button class="btn btn-ghost" id="btnPrev" title="上一环节">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M15 18l-6-6 6-6"></path>
          </svg>
          上一环节
        </button>
        <button class="btn btn-primary" id="btnStart">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" id="iconPlay">
            <polygon points="6 4 20 12 6 20 6 4"></polygon>
          </svg>
          <span id="startLabel">开始</span>
        </button>
        <button class="btn btn-ghost" id="btnNext" title="下一环节">
          下一环节
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 6l6 6-6 6"></path>
          </svg>
        </button>
      </div>

      <div class="keyhint">
        <span><span class="kbd">SPACE</span> 开始/暂停</span>
        <span><span class="kbd">R</span> 重置</span>
        <span><span class="kbd">,/.</span> 上/下环节</span>
      </div>
    </footer>
  </div>

  <!-- Drawer (Settings / Tweaks) -->
  <div class="overlay" id="overlay"></div>
  <aside class="drawer" id="drawer">
    <h3>
      <span>设置</span>
      <button class="icon-btn" id="drawerClose">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 6L6 18M6 6l12 12"></path>
        </svg>
      </button>
    </h3>

    <div class="drawer-section">
      <div class="drawer-section-label">外观</div>
      <div class="field-row">
        <span class="field-label">主题</span>
        <div class="chip-group" id="themeGroup">
          <button class="chip active" data-theme="warm">白底黑</button>
          <button class="chip" data-theme="dark">黑底黄</button>
          <button class="chip" data-theme="paper">蓝底白</button>
        </div>
      </div>
      <div class="field-row vf-font-row" style="display:none">
        <span class="field-label">字体大小</span>
        <div class="chip-group" id="fontGroup">
          <button class="chip" data-scale="0.9">小</button>
          <button class="chip active" data-scale="1">中</button>
          <button class="chip" data-scale="1.15">大</button>
        </div>
      </div>
    </div>

    <div class="drawer-section">
      <div class="drawer-section-label" style="display:flex;justify-content:space-between;align-items:center;">
        <span>环节设置</span>
        <span style="font-size:9px;opacity:.7">拖拽排序 · 可增删</span>
      </div>
      <div id="stagesList" class="stages-list"></div>
      <div style="display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;">
        <button class="chip add-chip" data-add="陈词" data-type="single" data-dur="180">+ 陈词</button>
        <button class="chip add-chip" data-add="立论" data-type="single" data-dur="180">+ 立论</button>
        <button class="chip add-chip" data-add="质询" data-type="single" data-dur="90">+ 质询</button>
        <button class="chip add-chip" data-add="对辩" data-type="duel" data-dur="120">+ 对辩</button>
        <button class="chip add-chip" data-add="自由辩论" data-type="single" data-dur="240">+ 自由辩论</button>
        <button class="chip add-chip" data-add="结辩" data-type="single" data-dur="180">+ 结辩</button>
        <button class="chip add-chip" data-add="自定义" data-type="single" data-dur="120">+ 自定义</button>
      </div>
    </div>

    <div class="drawer-section">
      <div class="drawer-section-label">计时器存储</div>
      <div class="field-row preset-name-row">
        <span class="field-label">名称</span>
        <input type="text" class="input input-text" id="presetNameInput" maxlength="24" placeholder="例如：校赛决赛">
      </div>
      <div class="preset-save-row">
        <button class="chip" id="savePresetBtn">保存当前计时器</button>
        <span id="presetStatus"></span>
      </div>
      <div class="preset-hint">最多保存 3 个，保存内容包含环节顺序、名称和时长。</div>
      <div id="presetList" class="preset-list"></div>
    </div>

    <div class="drawer-section">
      <div class="drawer-section-label">双方命名</div>
      <div class="field-row">
        <span class="field-label">正方</span>
        <input type="text" class="input input-text" id="proName">
      </div>
      <div class="field-row">
        <span class="field-label">反方</span>
        <input type="text" class="input input-text" id="conName">
      </div>
    </div>

    <div class="drawer-section">
      <div class="drawer-section-label">声音</div>
      <div class="field-row">
        <span class="field-label">提示音</span>
        <div class="switch on" id="swSound"></div>
      </div>
      <div class="field-row">
        <span class="field-label">最后10秒逐秒</span>
        <div class="switch on" id="swTick"></div>
      </div>
    </div>

    <div class="drawer-section">
      <div class="drawer-section-label">赛程流程</div>
      <div class="field-row">
        <span class="field-label">自动推进到下一环节</span>
        <div class="switch" id="swAutoFlow"></div>
      </div>
      <div style="font-size:11px; color: var(--ink-3); line-height: 1.5; margin-top: 8px; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.05em;" id="flowText"></div>
    </div>

    <div class="drawer-section">
      <div class="drawer-section-label">快捷键</div>
      <div style="display:grid; gap:8px; font-size: 12px; color: var(--ink-2);">
        <div style="display:flex; justify-content: space-between;"><span>开始 / 暂停</span><span class="kbd">SPACE</span></div>
        <div style="display:flex; justify-content: space-between;"><span>重置</span><span class="kbd">R</span></div>
        <div style="display:flex; justify-content: space-between;"><span>切换对辩方</span><span class="kbd">1 / 2</span></div>
        <div style="display:flex; justify-content: space-between;"><span>下一环节</span><span class="kbd">TAB</span></div>
        <div style="display:flex; justify-content: space-between;"><span>全屏</span><span class="kbd">F</span></div>
        <div style="display:flex; justify-content: space-between;"><span>提示音</span><span class="kbd">M</span></div>
      </div>
    </div>
  </aside>

  <div class="flash" id="flash"></div>
</body>
</html>
